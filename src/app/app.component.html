<ion-app>
  <ion-menu side="start" contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>infoFácil</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/home" routerDirection="root" detail="false">
            <ion-icon slot="start" name="home"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item routerLink="/configuracao" routerDirection="forward" detail="false">
            <ion-icon slot="start" name="settings"></ion-icon>
            <ion-label>Configuração</ion-label>
          </ion-item>
          <ion-item routerLink="/sobre" routerDirection="forward" detail="false">
            <ion-icon slot="start" name="information-circle"></ion-icon>
            <ion-label>Sobre</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
